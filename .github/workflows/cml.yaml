name: Model Performance Report
on: [push, pull_request]

permissions:
  contents: write
  pull-requests: write
  issues: write
  
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Setup Node.js (Fix for CML Canvas dependency)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup CML
        uses: iterative/setup-cml@v1

      - name: Setup DVC
        uses: iterative/setup-dvc@v1

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Authenticate and Pull Data from DagsHub
        env:
          DVC_REMOTE_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }} 
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user dm7041979
          dvc remote modify origin --local password $DVC_REMOTE_PASSWORD
          dvc pull

      - name: Reproduce DVC Pipeline
        run: dvc repro

      - name: Create CML Report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## 📊 Experiment Performance Metrics" > report.md
          
          echo "### Current Run Metrics" >> report.md
          dvc metrics show --md >> report.md
          
          echo "### Comparison with Master Branch" >> report.md
          git fetch origin master
          dvc metrics diff origin/master --md >> report.md
          
          echo "### Confusion Matrices" >> report.md
          echo "![Dataset 1 Confusion Matrix](./cm_dataset1.png)" >> report.md
          echo "![Dataset 2 Confusion Matrix](./cm_dataset2.png)" >> report.md
          
          cml comment create report.md
